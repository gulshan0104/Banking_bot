version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: banking-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: banking_db
      MYSQL_USER: banking_user
      MYSQL_PASSWORD: banking_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - banking-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: banking-backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: banking_user
      DB_PASSWORD: banking_password
      DB_NAME: banking_db
      BACKEND_PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - banking-network
    restart: unless-stopped

  chatbot:
    build:
      context: ../chatbot
      dockerfile: ../docker/Dockerfile.chatbot
    container_name: banking-chatbot
    environment:
      CHATBOT_PORT: 8000
      PYTHON_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: banking_user
      DB_PASSWORD: banking_password
      DB_NAME: banking_db
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - banking-network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: banking-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://backend:5000
    depends_on:
      - backend
    networks:
      - banking-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  banking-network:
    driver: bridge